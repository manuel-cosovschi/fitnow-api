version: '3.9'

services:
  api:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    environment:
      # Override DATABASE_URL to point at the bundled Postgres service.
      - DATABASE_URL=postgresql://${POSTGRES_USER:-fitnow}:${POSTGRES_PASSWORD:-fitnow}@db:5432/${POSTGRES_DB:-fitnow}
      - NODE_ENV=${NODE_ENV:-production}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fitnow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fitnow}
      POSTGRES_DB: ${POSTGRES_DB:-fitnow}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./sql/migrations.sql:/docker-entrypoint-initdb.d/02-migrations.sql
      - ./sql/ai-extras.sql:/docker-entrypoint-initdb.d/03-ai-extras.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fitnow} -d ${POSTGRES_DB:-fitnow}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  db_data:
  uploads:
